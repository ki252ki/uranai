<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>新聞占い</title>
<style>
body {
text-align: center;
margin-top: 50px;
}

img {
max-width: 1000px;
height: auto;
}
</style>
</head>
<body>

<h1>新聞占い</h1>

<img id="randomImage" src="" alt="ランダム画像">

<br><br>

<script>
const images = [
"images/①.png",
"images/②.png",
"images/③.png",
"images/④.png",
"images/⑤.png",
"images/⑥.png",
"images/⑦.png",
"images/⑧.png",
"images/⑨.png",
"images/⑩.png"
];

function showRandomImage() {
const randomIndex = Math.floor(Math.random() * images.length);
document.getElementById("randomImage").src = images[randomIndex];
}

// ページ読み込み時にも表示
showRandomImage();
</script>

</body>
</html>
